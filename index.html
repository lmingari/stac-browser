<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>STAC Browser</title>
</head>

<body>

<div id="app">

  <div class="panel browser">

    <h2>STAC Browser</h2>

    <div class="section">
      <h3>STAC</h3>
      <div id="stac-url"></div>
    </div>

    <div class="section">
      <h3>Filters</h3>
      <div id="collection"></div>
      <div id="event"></div>
      <div id="start-time"></div>
    </div>

    <div class="section">
      <h3>Items</h3>
      <div id="items"></div>
    </div>

    <div class="section">
      <h3>Assets</h3>
      <div id="assets"></div>
    </div>

  </div>

  <div class="panel map">
    <div id="map" class="map-container"></div>
  </div>

  <div id="step-nav" class="step-nav">
    <button class="step-prev">‹</button>
    <span class="step-label">Step 0</span>
    <button class="step-next">›</button>
  </div>

</div>

<script type="module" src="/src/main.js"></script>

</body>
</html>
